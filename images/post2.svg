<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="600" fill="#FDF7EA"/>
  <g fill="#0F766E" opacity="0.08">
    <circle cx="120" cy="500" r="80"/><circle cx="700" cy="120" r="60"/>
  </g>
  <!-- light rays -->
  <g stroke="#F59E0B" stroke-width="6" stroke-linecap="round" opacity="0.7">
    <line x1="400" y1="80" x2="400" y2="40"/>
    <line x1="280" y1="120" x2="250" y2="90"/>
    <line x1="520" y1="120" x2="550" y2="90"/>
    <line x1="220" y1="220" x2="180" y2="220"/>
    <line x1="580" y1="220" x2="620" y2="220"/>
  </g>
  <!-- bulb -->
  <g transform="translate(400 280)">
    <circle r="110" fill="#F59E0B"/>
    <circle r="90" fill="#FAF6EE" opacity="0.25"/>
    <!-- filament squiggle -->
    <path d="M-44 -20 Q-22 -50 0 -20 T44 -20 Q22 10 0 -20" fill="none" stroke="#0F172A" stroke-width="6" stroke-linecap="round"/>
    <!-- base -->
    <rect x="-36" y="100" width="72" height="22" rx="3" fill="#0F172A"/>
    <rect x="-30" y="124" width="60" height="14" rx="2" fill="#0F172A" opacity="0.7"/>
    <rect x="-22" y="140" width="44" height="14" rx="2" fill="#0F172A" opacity="0.5"/>
  </g>
  <!-- brain doodle inside bulb -->
  <g transform="translate(400 270)" stroke="#0F766E" stroke-width="4" fill="none" opacity="0.55">
    <path d="M-40 0 Q-50 -20 -30 -30 Q-10 -40 10 -30 Q30 -40 40 -20 Q50 0 30 10 Q40 30 10 30 Q-10 40 -30 30 Q-50 20 -40 0 Z"/>
    <path d="M0 -30 V30"/>
  </g>
</svg>
