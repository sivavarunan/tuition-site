<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="600" fill="#0F172A"/>
  <g stroke="#FAF6EE" opacity="0.05" stroke-width="1">
    <path d="M0 100 H800 M0 200 H800 M0 300 H800 M0 400 H800 M0 500 H800"/>
  </g>
  <!-- big curly braces -->
  <g fill="none" stroke="#0F766E" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <path d="M180 130 Q120 130 120 200 L120 280 Q120 300 90 300 Q120 300 120 320 L120 400 Q120 470 180 470"/>
    <path d="M620 130 Q680 130 680 200 L680 280 Q680 300 710 300 Q680 300 680 320 L680 400 Q680 470 620 470"/>
  </g>
  <!-- UML class boxes (no text) -->
  <g>
    <g transform="translate(280 180)">
      <rect width="120" height="80" rx="6" fill="#FAF6EE" stroke="#F59E0B" stroke-width="3"/>
      <rect x="0" y="0" width="120" height="22" rx="6" fill="#F59E0B"/>
      <rect x="10" y="34" width="80" height="6" rx="2" fill="#0F172A" opacity="0.6"/>
      <rect x="10" y="48" width="60" height="6" rx="2" fill="#0F172A" opacity="0.4"/>
      <rect x="10" y="62" width="90" height="6" rx="2" fill="#0F172A" opacity="0.4"/>
    </g>
    <g transform="translate(420 180)">
      <rect width="120" height="80" rx="6" fill="#FAF6EE" stroke="#F59E0B" stroke-width="3"/>
      <rect x="0" y="0" width="120" height="22" rx="6" fill="#F59E0B"/>
      <rect x="10" y="34" width="60" height="6" rx="2" fill="#0F172A" opacity="0.6"/>
      <rect x="10" y="48" width="80" height="6" rx="2" fill="#0F172A" opacity="0.4"/>
      <rect x="10" y="62" width="50" height="6" rx="2" fill="#0F172A" opacity="0.4"/>
    </g>
  </g>
  <!-- sibling connector -->
  <line x1="400" y1="220" x2="420" y2="220" stroke="#F59E0B" stroke-width="3"/>
  <!-- child class -->
  <g transform="translate(340 340)">
    <rect width="120" height="60" rx="6" fill="#0F766E" stroke="#FAF6EE" stroke-width="3"/>
    <rect x="15" y="22" width="90" height="6" rx="2" fill="#FAF6EE" opacity="0.85"/>
    <rect x="15" y="36" width="60" height="6" rx="2" fill="#FAF6EE" opacity="0.6"/>
  </g>
  <!-- inheritance arrow (dashed) -->
  <line x1="400" y1="262" x2="400" y2="332" stroke="#F59E0B" stroke-width="3" stroke-dasharray="6 5"/>
  <polygon points="392,332 408,332 400,318" fill="none" stroke="#F59E0B" stroke-width="3"/>
</svg>
