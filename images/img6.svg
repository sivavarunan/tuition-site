<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#FDF7EA"/>
  <!-- network connection lines -->
  <g stroke="#0F766E" stroke-width="3" opacity="0.55">
    <line x1="400" y1="400" x2="180" y2="220"/>
    <line x1="400" y1="400" x2="620" y2="220"/>
    <line x1="400" y1="400" x2="180" y2="580"/>
    <line x1="400" y1="400" x2="620" y2="580"/>
    <line x1="400" y1="400" x2="160" y2="400"/>
    <line x1="400" y1="400" x2="640" y2="400"/>
    <line x1="400" y1="400" x2="400" y2="160"/>
    <line x1="400" y1="400" x2="400" y2="640"/>
    <!-- secondary connections -->
    <line x1="180" y1="220" x2="160" y2="400" stroke-dasharray="6 6"/>
    <line x1="620" y1="220" x2="640" y2="400" stroke-dasharray="6 6"/>
    <line x1="180" y1="580" x2="160" y2="400" stroke-dasharray="6 6"/>
    <line x1="620" y1="580" x2="640" y2="400" stroke-dasharray="6 6"/>
  </g>
  <!-- central hub -->
  <circle cx="400" cy="400" r="60" fill="#0F766E" stroke="#0F172A" stroke-width="5"/>
  <circle cx="400" cy="400" r="28" fill="#F59E0B"/>
  <!-- outer device nodes -->
  <g fill="#F59E0B" stroke="#0F172A" stroke-width="4">
    <!-- corners (devices represented as small rounded rects) -->
    <rect x="150" y="180" width="60" height="80" rx="8"/>
    <rect x="590" y="180" width="60" height="80" rx="8"/>
    <rect x="150" y="540" width="60" height="80" rx="8"/>
    <rect x="590" y="540" width="60" height="80" rx="8"/>
    <!-- mid points (smaller circles) -->
    <circle cx="160" cy="400" r="22"/>
    <circle cx="640" cy="400" r="22"/>
    <circle cx="400" cy="160" r="22"/>
    <circle cx="400" cy="640" r="22"/>
  </g>
  <!-- screen highlights on the device rects -->
  <g fill="#FAF6EE" opacity="0.6">
    <rect x="160" y="190" width="40" height="20" rx="2"/>
    <rect x="600" y="190" width="40" height="20" rx="2"/>
    <rect x="160" y="550" width="40" height="20" rx="2"/>
    <rect x="600" y="550" width="40" height="20" rx="2"/>
  </g>
  <!-- signal pulses -->
  <g fill="none" stroke="#0F766E" stroke-width="3" opacity="0.4">
    <circle cx="400" cy="400" r="120"/>
    <circle cx="400" cy="400" r="170"/>
  </g>
</svg>
