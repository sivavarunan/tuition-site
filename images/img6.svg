<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#FDF7EA"/>
  <!-- network mesh -->
  <g stroke="#0F766E" stroke-width="3" opacity="0.6">
    <line x1="200" y1="200" x2="400" y2="320"/>
    <line x1="600" y1="180" x2="400" y2="320"/>
    <line x1="160" y1="500" x2="400" y2="320"/>
    <line x1="640" y1="540" x2="400" y2="320"/>
    <line x1="400" y1="320" x2="400" y2="600"/>
    <line x1="200" y1="200" x2="600" y2="180"/>
    <line x1="160" y1="500" x2="640" y2="540"/>
    <line x1="200" y1="200" x2="160" y2="500"/>
    <line x1="600" y1="180" x2="640" y2="540"/>
  </g>
  <!-- nodes -->
  <g>
    <!-- corner devices -->
    <g transform="translate(200 200)">
      <circle r="38" fill="#0F766E"/>
      <rect x="-18" y="-14" width="36" height="22" rx="3" fill="#FDF7EA"/>
      <rect x="-12" y="9" width="24" height="3" fill="#FDF7EA"/>
    </g>
    <g transform="translate(600 180)">
      <circle r="38" fill="#0F766E"/>
      <!-- phone -->
      <rect x="-12" y="-20" width="24" height="40" rx="4" fill="#FDF7EA"/>
      <circle cx="0" cy="14" r="2.5" fill="#0F766E"/>
    </g>
    <g transform="translate(160 500)">
      <circle r="38" fill="#0F766E"/>
      <!-- bulb -->
      <circle cx="0" cy="-4" r="14" fill="#F59E0B"/>
      <rect x="-6" y="8" width="12" height="10" fill="#FDF7EA"/>
    </g>
    <g transform="translate(640 540)">
      <circle r="38" fill="#0F766E"/>
      <!-- watch -->
      <rect x="-14" y="-14" width="28" height="28" rx="6" fill="#FDF7EA"/>
      <circle cx="0" cy="0" r="4" fill="#0F766E"/>
    </g>
    <!-- center hub -->
    <g transform="translate(400 320)">
      <circle r="56" fill="#F59E0B"/>
      <circle r="44" fill="none" stroke="#FDF7EA" stroke-width="3" opacity="0.7"/>
      <text y="10" text-anchor="middle" font-family="Georgia, serif" font-size="34" fill="#0F172A" font-weight="700">IoT</text>
    </g>
    <!-- bottom server -->
    <g transform="translate(400 600)">
      <rect x="-46" y="-32" width="92" height="64" rx="6" fill="#0F172A"/>
      <rect x="-36" y="-22" width="72" height="6" fill="#0F766E"/>
      <rect x="-36" y="-10" width="72" height="6" fill="#0F766E"/>
      <rect x="-36" y="2" width="72" height="6" fill="#F59E0B"/>
      <circle cx="34" cy="20" r="3" fill="#F59E0B"/>
    </g>
  </g>
  <!-- caption -->
  <rect x="120" y="700" width="560" height="56" rx="10" fill="#0F766E"/>
  <text x="400" y="738" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#FDF7EA" font-weight="600">NETWORKED LEARNING</text>
</svg>
