<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="600" fill="#0F766E"/>
  <g fill="#FAF6EE" opacity="0.08">
    <circle cx="100" cy="100" r="40"/><circle cx="700" cy="500" r="60"/>
  </g>
  <!-- notebook -->
  <g transform="translate(180 110)">
    <rect width="320" height="400" rx="12" fill="#FAF6EE" stroke="#0F172A" stroke-width="5"/>
    <!-- spiral binding -->
    <g fill="#0F172A">
      <circle cx="0" cy="40" r="6"/>
      <circle cx="0" cy="100" r="6"/>
      <circle cx="0" cy="160" r="6"/>
      <circle cx="0" cy="220" r="6"/>
      <circle cx="0" cy="280" r="6"/>
      <circle cx="0" cy="340" r="6"/>
    </g>
    <!-- ruled lines (no text) -->
    <g stroke="#0F766E" stroke-width="2" opacity="0.3">
      <line x1="50" y1="80" x2="280" y2="80"/>
      <line x1="50" y1="120" x2="280" y2="120"/>
      <line x1="50" y1="160" x2="280" y2="160"/>
      <line x1="50" y1="200" x2="280" y2="200"/>
      <line x1="50" y1="240" x2="280" y2="240"/>
      <line x1="50" y1="280" x2="280" y2="280"/>
      <line x1="50" y1="320" x2="280" y2="320"/>
    </g>
    <!-- checked items -->
    <g>
      <rect x="50" y="68" width="22" height="22" rx="4" fill="#0F766E"/>
      <path d="M55 80 L62 87 L70 73" stroke="#FAF6EE" stroke-width="3" fill="none" stroke-linecap="round"/>
      <rect x="80" y="74" width="160" height="10" rx="3" fill="#0F172A" opacity="0.7"/>
    </g>
    <g>
      <rect x="50" y="108" width="22" height="22" rx="4" fill="#0F766E"/>
      <path d="M55 120 L62 127 L70 113" stroke="#FAF6EE" stroke-width="3" fill="none" stroke-linecap="round"/>
      <rect x="80" y="114" width="180" height="10" rx="3" fill="#0F172A" opacity="0.7"/>
    </g>
    <g>
      <rect x="50" y="148" width="22" height="22" rx="4" fill="#F59E0B" stroke="#0F172A" stroke-width="2"/>
      <rect x="80" y="154" width="140" height="10" rx="3" fill="#0F172A" opacity="0.5"/>
    </g>
    <g>
      <rect x="50" y="188" width="22" height="22" rx="4" fill="none" stroke="#0F172A" stroke-width="2"/>
      <rect x="80" y="194" width="170" height="10" rx="3" fill="#0F172A" opacity="0.4"/>
    </g>
    <g>
      <rect x="50" y="228" width="22" height="22" rx="4" fill="none" stroke="#0F172A" stroke-width="2"/>
      <rect x="80" y="234" width="120" height="10" rx="3" fill="#0F172A" opacity="0.4"/>
    </g>
  </g>
  <!-- pencil -->
  <g transform="translate(560 380) rotate(35)">
    <rect x="0" y="-12" width="160" height="24" fill="#F59E0B" stroke="#0F172A" stroke-width="3"/>
    <rect x="160" y="-12" width="20" height="24" fill="#FAF6EE" stroke="#0F172A" stroke-width="3"/>
    <polygon points="180,-12 210,0 180,12" fill="#0F172A"/>
    <rect x="-30" y="-12" width="30" height="24" fill="#FAF6EE" stroke="#0F172A" stroke-width="3"/>
    <rect x="-25" y="-12" width="6" height="24" fill="#0F172A"/>
  </g>
  <!-- clock -->
  <g transform="translate(620 130)">
    <circle r="50" fill="#FAF6EE" stroke="#0F172A" stroke-width="5"/>
    <line x1="0" y1="0" x2="0" y2="-32" stroke="#0F172A" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="22" y2="0" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
    <circle r="5" fill="#0F172A"/>
  </g>
</svg>
