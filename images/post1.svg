<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="600" fill="#0F766E"/>
  <g fill="#FAF6EE" opacity="0.07">
    <circle cx="80" cy="80" r="40"/><circle cx="720" cy="520" r="60"/>
  </g>
  <!-- notebook -->
  <g transform="translate(220 120)">
    <rect width="360" height="380" rx="14" fill="#FAF6EE"/>
    <rect x="0" y="0" width="40" height="380" fill="#F59E0B"/>
    <g stroke="#0F766E" stroke-width="3" opacity="0.5">
      <line x1="70" y1="70" x2="320" y2="70"/>
      <line x1="70" y1="120" x2="320" y2="120"/>
      <line x1="70" y1="170" x2="280" y2="170"/>
      <line x1="70" y1="220" x2="320" y2="220"/>
      <line x1="70" y1="270" x2="260" y2="270"/>
    </g>
    <!-- check marks -->
    <g stroke="#0F766E" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M325 60 L335 75 L355 50"/>
      <path d="M325 110 L335 125 L355 100"/>
    </g>
    <!-- pencil -->
    <g transform="translate(60 320)">
      <rect width="220" height="14" fill="#F59E0B" rx="2"/>
      <polygon points="220,0 240,7 220,14" fill="#0F172A"/>
      <rect x="0" y="0" width="20" height="14" fill="#0F172A"/>
    </g>
  </g>
  <!-- clock top right -->
  <g transform="translate(640 100)">
    <circle r="50" fill="#FAF6EE" stroke="#F59E0B" stroke-width="6"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="22" y2="0" stroke="#0F172A" stroke-width="4" stroke-linecap="round"/>
    <circle r="4" fill="#0F172A"/>
  </g>
</svg>
