<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#0F766E"/>
  <!-- pattern -->
  <g fill="#FAF6EE" opacity="0.07">
    <circle cx="100" cy="700" r="60"/><circle cx="700" cy="100" r="80"/>
  </g>
  <!-- shield -->
  <g transform="translate(400 400)">
    <path d="M0 -220 L180 -160 L180 30 Q180 160 0 250 Q-180 160 -180 30 L-180 -160 Z"
          fill="#FAF6EE" stroke="#F59E0B" stroke-width="10" stroke-linejoin="round"/>
    <!-- inner shield -->
    <path d="M0 -180 L150 -130 L150 20 Q150 130 0 210 Q-150 130 -150 20 L-150 -130 Z"
          fill="none" stroke="#0F766E" stroke-width="4" opacity="0.6"/>
    <!-- keyhole / lock -->
    <g transform="translate(0 -10)">
      <rect x="-50" y="-10" width="100" height="100" rx="14" fill="#0F766E"/>
      <path d="M-32 -10 V-44 Q-32 -78 0 -78 Q32 -78 32 -44 V-10"
            fill="none" stroke="#0F766E" stroke-width="14" stroke-linecap="round"/>
      <circle cx="0" cy="30" r="12" fill="#F59E0B"/>
      <rect x="-6" y="30" width="12" height="32" fill="#F59E0B"/>
    </g>
  </g>
  <!-- caption -->
  <rect x="120" y="680" width="560" height="56" rx="10" fill="#0F172A"/>
  <text x="400" y="718" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#FAF6EE" font-weight="600">CYBER SECURITY</text>
</svg>
