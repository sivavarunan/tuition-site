<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#0F766E"/>
  <!-- decorative dots/grid -->
  <g fill="#FAF6EE" opacity="0.06">
    <circle cx="100" cy="100" r="5"/>
    <circle cx="700" cy="120" r="6"/>
    <circle cx="120" cy="700" r="5"/>
    <circle cx="680" cy="680" r="7"/>
  </g>
  <!-- shield -->
  <g transform="translate(400 400)">
    <path d="M0 -240 L200 -180 L200 60 Q200 220 0 290 Q-200 220 -200 60 L-200 -180 Z"
          fill="#FAF6EE" stroke="#0F172A" stroke-width="8"/>
    <!-- inner shield outline -->
    <path d="M0 -200 L160 -150 L160 50 Q160 190 0 250 Q-160 190 -160 50 L-160 -150 Z"
          fill="none" stroke="#0F766E" stroke-width="5" opacity="0.4"/>
    <!-- lock body -->
    <rect x="-60" y="0" width="120" height="100" rx="10" fill="#0F172A"/>
    <!-- lock shackle -->
    <path d="M-40 0 L-40 -50 Q-40 -90 0 -90 Q40 -90 40 -50 L40 0"
          fill="none" stroke="#0F172A" stroke-width="14" stroke-linecap="round"/>
    <!-- keyhole -->
    <circle cx="0" cy="40" r="10" fill="#F59E0B"/>
    <rect x="-4" y="46" width="8" height="22" fill="#F59E0B"/>
    <!-- check at top -->
    <path d="M-30 -140 L-10 -120 L40 -170" fill="none" stroke="#F59E0B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
