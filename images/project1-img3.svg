<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="600" fill="#0F172A"/>
  <g fill="#FAF6EE" opacity="0.06">
    <circle cx="100" cy="100" r="3"/><circle cx="200" cy="60" r="2"/><circle cx="320" cy="120" r="3"/>
    <circle cx="900" cy="80" r="3"/><circle cx="1050" cy="140" r="2"/><circle cx="1150" cy="60" r="3"/>
    <circle cx="80" cy="500" r="2"/><circle cx="220" cy="540" r="3"/><circle cx="1100" cy="520" r="3"/>
  </g>
  <!-- left: notebook -->
  <g transform="translate(80 100)">
    <rect width="460" height="400" rx="12" fill="#FAF6EE" stroke="#F59E0B" stroke-width="4"/>
    <line x1="60" y1="0" x2="60" y2="400" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
    <g stroke="#0F766E" stroke-width="1" opacity="0.3">
      <line x1="60" y1="60" x2="460" y2="60"/>
      <line x1="60" y1="100" x2="460" y2="100"/>
      <line x1="60" y1="140" x2="460" y2="140"/>
      <line x1="60" y1="180" x2="460" y2="180"/>
      <line x1="60" y1="220" x2="460" y2="220"/>
      <line x1="60" y1="260" x2="460" y2="260"/>
      <line x1="60" y1="300" x2="460" y2="300"/>
      <line x1="60" y1="340" x2="460" y2="340"/>
    </g>
    <!-- accent title bar -->
    <rect x="80" y="34" width="200" height="14" rx="4" fill="#0F766E"/>
    <!-- abstract content lines -->
    <g fill="#0F172A">
      <rect x="80" y="84" width="180" height="8" rx="3" opacity="0.7"/>
      <rect x="80" y="124" width="220" height="8" rx="3" opacity="0.7"/>
      <rect x="80" y="164" width="140" height="8" rx="3" opacity="0.7"/>
      <rect x="80" y="244" width="120" height="10" rx="3" fill="#F59E0B"/>
      <rect x="80" y="284" width="200" height="8" rx="3" opacity="0.7"/>
    </g>
    <!-- check at the bottom -->
    <g transform="translate(360 340)">
      <circle r="22" fill="#0F766E"/>
      <path d="M-10 0 L-3 7 L11 -8" stroke="#FAF6EE" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <!-- right: chalk-style board -->
  <g transform="translate(620 100)">
    <rect width="500" height="400" rx="12" fill="#0F766E" stroke="#FAF6EE" stroke-width="4"/>
    <!-- accent header -->
    <rect x="40" y="50" width="200" height="14" rx="4" fill="#F59E0B"/>
    <line x1="40" y1="80" x2="280" y2="80" stroke="#FAF6EE" stroke-width="3"/>
    <!-- abstract formula representation: stacked bars and a fraction line -->
    <g fill="#FAF6EE">
      <rect x="60" y="140" width="40" height="14" rx="4"/>
      <rect x="120" y="140" width="80" height="14" rx="4" fill="#F59E0B"/>
      <rect x="220" y="140" width="60" height="14" rx="4"/>
      <rect x="60" y="200" width="320" height="6" rx="3"/>
      <rect x="160" y="240" width="80" height="14" rx="4"/>
    </g>
    <!-- x = formula structure -->
    <g fill="none" stroke="#FAF6EE" stroke-width="3" opacity="0.5">
      <circle cx="420" cy="170" r="20"/>
      <circle cx="420" cy="220" r="20"/>
    </g>
    <!-- subtle grid hint at bottom -->
    <g stroke="#FAF6EE" stroke-width="1" opacity="0.2">
      <line x1="40" y1="320" x2="460" y2="320"/>
      <line x1="40" y1="350" x2="460" y2="350"/>
    </g>
  </g>
</svg>
