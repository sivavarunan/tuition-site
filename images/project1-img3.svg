<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="600" fill="#0F172A"/>
  <!-- subtle dots -->
  <g fill="#FAF6EE" opacity="0.08">
    <circle cx="100" cy="100" r="3"/><circle cx="200" cy="60" r="2"/><circle cx="320" cy="120" r="3"/>
    <circle cx="900" cy="80" r="3"/><circle cx="1050" cy="140" r="2"/><circle cx="1150" cy="60" r="3"/>
    <circle cx="80" cy="500" r="2"/><circle cx="220" cy="540" r="3"/><circle cx="1100" cy="520" r="3"/>
  </g>
  <!-- left: notebook with worked solution -->
  <g transform="translate(80 100)">
    <rect width="460" height="400" rx="12" fill="#FAF6EE" stroke="#F59E0B" stroke-width="4"/>
    <line x1="60" y1="0" x2="60" y2="400" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
    <g stroke="#0F766E" stroke-width="1" opacity="0.25">
      <line x1="60" y1="60" x2="460" y2="60"/>
      <line x1="60" y1="100" x2="460" y2="100"/>
      <line x1="60" y1="140" x2="460" y2="140"/>
      <line x1="60" y1="180" x2="460" y2="180"/>
      <line x1="60" y1="220" x2="460" y2="220"/>
      <line x1="60" y1="260" x2="460" y2="260"/>
      <line x1="60" y1="300" x2="460" y2="300"/>
      <line x1="60" y1="340" x2="460" y2="340"/>
    </g>
    <g font-family="Georgia, serif" fill="#0F172A">
      <text x="80" y="50" font-size="26" font-weight="700" fill="#0F766E">Solve: 2x + 5 = 17</text>
      <text x="80" y="130" font-size="22">2x = 17 − 5</text>
      <text x="80" y="170" font-size="22">2x = 12</text>
      <text x="80" y="210" font-size="22">x = 6</text>
      <text x="80" y="290" font-size="22" fill="#0F766E" font-weight="700">Check:</text>
      <text x="80" y="330" font-size="22">2(6) + 5 = 17 ✓</text>
    </g>
  </g>
  <!-- right: chalk-style equation board -->
  <g transform="translate(620 100)">
    <rect width="500" height="400" rx="12" fill="#0F766E" stroke="#FAF6EE" stroke-width="4"/>
    <g font-family="Georgia, serif" fill="#FAF6EE">
      <text x="40" y="80" font-size="32" font-weight="700">Quadratic Formula</text>
      <line x1="40" y1="100" x2="280" y2="100" stroke="#F59E0B" stroke-width="3"/>
      <text x="60" y="200" font-size="44" font-weight="700">x =</text>
      <text x="160" y="180" font-size="36" font-weight="700" fill="#F59E0B">−b ± √(b²−4ac)</text>
      <line x1="160" y1="195" x2="460" y2="195" stroke="#FAF6EE" stroke-width="3"/>
      <text x="270" y="240" font-size="36" font-weight="700">2a</text>
      <text x="40" y="320" font-size="22" opacity="0.85">where ax² + bx + c = 0</text>
      <text x="40" y="360" font-size="22" opacity="0.85" fill="#F59E0B">discriminant: b² − 4ac</text>
    </g>
  </g>
</svg>
