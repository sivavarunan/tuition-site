<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#0F766E"/>
  <!-- chalkboard frame -->
  <rect x="80" y="100" width="640" height="600" rx="14" fill="#0F2A2A" stroke="#FAF6EE" stroke-width="6"/>
  <!-- compass / circle construction -->
  <g stroke="#FAF6EE" stroke-width="5" fill="none" opacity="0.85">
    <circle cx="280" cy="380" r="130"/>
    <line x1="150" y1="380" x2="410" y2="380"/>
    <line x1="280" y1="250" x2="280" y2="510"/>
  </g>
  <!-- right triangle -->
  <polygon points="500,260 660,260 580,420" fill="none" stroke="#F59E0B" stroke-width="6"/>
  <rect x="500" y="240" width="22" height="22" fill="none" stroke="#F59E0B" stroke-width="3"/>
  <!-- square -->
  <rect x="460" y="470" width="110" height="110" fill="none" stroke="#FAF6EE" stroke-width="5"/>
  <!-- diagonal in square -->
  <line x1="460" y1="470" x2="570" y2="580" stroke="#F59E0B" stroke-width="3" opacity="0.7"/>
  <!-- circle accent -->
  <circle cx="640" cy="500" r="55" fill="none" stroke="#F59E0B" stroke-width="5"/>
  <!-- 3 dots -->
  <g fill="#F59E0B">
    <circle cx="160" cy="600" r="7"/>
    <circle cx="195" cy="600" r="7"/>
    <circle cx="230" cy="600" r="7"/>
  </g>
  <!-- top-left abstract notation lines -->
  <g stroke="#FAF6EE" stroke-width="3" stroke-linecap="round" opacity="0.55">
    <line x1="120" y1="160" x2="200" y2="160"/>
    <line x1="120" y1="185" x2="170" y2="185"/>
    <line x1="120" y1="210" x2="190" y2="210"/>
  </g>
</svg>
