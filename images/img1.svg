<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#0F766E"/>
  <!-- soft texture dots -->
  <g fill="#ffffff" opacity="0.08">
    <circle cx="80" cy="120" r="4"/><circle cx="160" cy="80" r="3"/><circle cx="700" cy="140" r="5"/><circle cx="720" cy="220" r="3"/>
    <circle cx="120" cy="640" r="4"/><circle cx="60" cy="700" r="3"/><circle cx="660" cy="660" r="4"/><circle cx="740" cy="720" r="3"/>
  </g>
  <!-- chalkboard panel -->
  <rect x="120" y="180" width="560" height="380" rx="18" fill="#0F172A" stroke="#FAF6EE" stroke-width="6" opacity="0.92"/>
  <!-- chalk equation: 2 + 3 = 5 -->
  <g fill="none" stroke="#FAF6EE" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" font-family="Arial, sans-serif">
    <text x="180" y="370" font-size="120" fill="#FAF6EE" stroke="none" font-weight="700">2</text>
    <text x="265" y="370" font-size="120" fill="#F59E0B" stroke="none" font-weight="700">+</text>
    <text x="345" y="370" font-size="120" fill="#FAF6EE" stroke="none" font-weight="700">3</text>
    <text x="430" y="370" font-size="120" fill="#F59E0B" stroke="none" font-weight="700">=</text>
    <text x="525" y="370" font-size="120" fill="#FAF6EE" stroke="none" font-weight="700">5</text>
  </g>
  <!-- triangle, circle, square row -->
  <g stroke="#F59E0B" stroke-width="8" fill="none">
    <polygon points="220,500 280,420 340,500" />
    <circle cx="400" cy="460" r="42"/>
    <rect x="460" y="420" width="80" height="80"/>
  </g>
  <!-- pi symbol bottom right -->
  <text x="600" y="510" font-size="72" font-family="Georgia, serif" fill="#F59E0B" font-weight="700">π</text>
  <!-- caption strip -->
  <rect x="120" y="600" width="560" height="56" rx="10" fill="#FAF6EE" opacity="0.95"/>
  <text x="400" y="638" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#0F172A" font-weight="600">MATHEMATICS</text>
</svg>
