<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#FDF7EA"/>
  <!-- atom orbits -->
  <g transform="translate(400 400)" fill="none" stroke="#0F766E" stroke-width="6">
    <ellipse cx="0" cy="0" rx="220" ry="80" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="220" ry="80" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="220" ry="80" transform="rotate(120)"/>
  </g>
  <!-- nucleus -->
  <circle cx="400" cy="400" r="36" fill="#F59E0B"/>
  <circle cx="400" cy="400" r="20" fill="#FDF7EA"/>
  <!-- electrons -->
  <g fill="#F59E0B">
    <circle cx="620" cy="400" r="14"/>
    <circle cx="290" cy="210" r="14"/>
    <circle cx="290" cy="590" r="14"/>
  </g>
  <!-- flask (bottom right) -->
  <g transform="translate(560 560)">
    <path d="M0 0 L50 0 L50 30 L80 90 Q60 120 25 120 Q-10 120 -30 90 L0 30 Z" fill="#0F766E" stroke="#0F172A" stroke-width="5"/>
    <rect x="-10" y="-15" width="70" height="20" rx="5" fill="#0F172A"/>
    <!-- bubbles -->
    <circle cx="20" cy="80" r="6" fill="#FAF6EE" opacity="0.8"/>
    <circle cx="40" cy="95" r="4" fill="#FAF6EE" opacity="0.8"/>
    <circle cx="10" cy="100" r="5" fill="#FAF6EE" opacity="0.8"/>
  </g>
  <!-- decorative dots -->
  <g fill="#0F766E" opacity="0.25">
    <circle cx="120" cy="120" r="6"/>
    <circle cx="700" cy="140" r="8"/>
    <circle cx="100" cy="700" r="10"/>
  </g>
</svg>
