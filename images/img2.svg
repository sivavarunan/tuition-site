<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#FDF7EA"/>
  <!-- soft pattern -->
  <g fill="#0F766E" opacity="0.06">
    <circle cx="80" cy="80" r="40"/><circle cx="720" cy="720" r="60"/><circle cx="700" cy="80" r="20"/>
  </g>
  <!-- atom -->
  <g transform="translate(400 400)">
    <ellipse cx="0" cy="0" rx="220" ry="80" fill="none" stroke="#0F766E" stroke-width="6" opacity="0.85"/>
    <ellipse cx="0" cy="0" rx="220" ry="80" fill="none" stroke="#0F766E" stroke-width="6" opacity="0.85" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="220" ry="80" fill="none" stroke="#0F766E" stroke-width="6" opacity="0.85" transform="rotate(-60)"/>
    <!-- electrons -->
    <circle cx="220" cy="0" r="12" fill="#F59E0B"/>
    <circle cx="-110" cy="-190" r="12" fill="#F59E0B"/>
    <circle cx="-110" cy="190" r="12" fill="#F59E0B"/>
    <!-- nucleus -->
    <circle cx="0" cy="0" r="34" fill="#0F766E"/>
    <circle cx="-12" cy="-8" r="6" fill="#FDF7EA" opacity="0.5"/>
  </g>
  <!-- flask top right corner -->
  <g transform="translate(620 110)">
    <path d="M0 0 L40 0 L40 40 L70 110 Q80 130 60 130 L-20 130 Q-40 130 -30 110 L0 40 Z" fill="none" stroke="#F59E0B" stroke-width="5" stroke-linejoin="round"/>
    <path d="M-20 95 L60 95" stroke="#F59E0B" stroke-width="5" stroke-linecap="round"/>
    <circle cx="20" cy="115" r="4" fill="#F59E0B"/>
    <circle cx="0" cy="120" r="3" fill="#F59E0B"/>
  </g>
  <!-- caption -->
  <rect x="120" y="680" width="560" height="56" rx="10" fill="#0F766E"/>
  <text x="400" y="718" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#FDF7EA" font-weight="600">SCIENCE</text>
</svg>
