<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#F59E0B"/>
  <!-- soft texture -->
  <g fill="#FAF6EE" opacity="0.12">
    <circle cx="120" cy="120" r="60"/><circle cx="680" cy="700" r="80"/>
  </g>
  <!-- table -->
  <ellipse cx="400" cy="540" rx="240" ry="36" fill="#0F172A" opacity="0.9"/>
  <!-- 4 student circles around the table -->
  <!-- left student -->
  <g transform="translate(180 440)">
    <circle cx="0" cy="0" r="44" fill="#0F766E"/>
    <circle cx="0" cy="-12" r="20" fill="#FAF6EE"/>
    <path d="M-30 22 Q0 0 30 22" fill="#FAF6EE"/>
  </g>
  <!-- right student -->
  <g transform="translate(620 440)">
    <circle cx="0" cy="0" r="44" fill="#0F766E"/>
    <circle cx="0" cy="-12" r="20" fill="#FAF6EE"/>
    <path d="M-30 22 Q0 0 30 22" fill="#FAF6EE"/>
  </g>
  <!-- back left student -->
  <g transform="translate(310 360)">
    <circle cx="0" cy="0" r="40" fill="#0F172A"/>
    <circle cx="0" cy="-10" r="18" fill="#FAF6EE"/>
    <path d="M-26 18 Q0 0 26 18" fill="#FAF6EE"/>
  </g>
  <!-- back right student -->
  <g transform="translate(490 360)">
    <circle cx="0" cy="0" r="40" fill="#0F172A"/>
    <circle cx="0" cy="-10" r="18" fill="#FAF6EE"/>
    <path d="M-26 18 Q0 0 26 18" fill="#FAF6EE"/>
  </g>
  <!-- center book on table -->
  <g transform="translate(400 510)">
    <rect x="-60" y="-22" width="120" height="44" rx="4" fill="#FAF6EE"/>
    <line x1="0" y1="-22" x2="0" y2="22" stroke="#0F766E" stroke-width="3"/>
    <line x1="-44" y1="-8" x2="-12" y2="-8" stroke="#0F766E" stroke-width="2"/>
    <line x1="-44" y1="2" x2="-12" y2="2" stroke="#0F766E" stroke-width="2"/>
    <line x1="12" y1="-8" x2="44" y2="-8" stroke="#0F766E" stroke-width="2"/>
    <line x1="12" y1="2" x2="44" y2="2" stroke="#0F766E" stroke-width="2"/>
  </g>
  <!-- speech bubble top -->
  <g transform="translate(400 180)">
    <ellipse cx="0" cy="0" rx="120" ry="60" fill="#FAF6EE"/>
    <path d="M-30 50 L-10 80 L0 56 Z" fill="#FAF6EE"/>
    <text x="0" y="10" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#0F766E" font-weight="700">Aha!</text>
  </g>
  <!-- caption -->
  <rect x="120" y="680" width="560" height="56" rx="10" fill="#0F172A"/>
  <text x="400" y="718" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#FAF6EE" font-weight="600">GROUP CLASSES</text>
</svg>
