<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#F59E0B"/>
  <!-- table -->
  <ellipse cx="400" cy="490" rx="240" ry="60" fill="#FAF6EE" stroke="#0F172A" stroke-width="6"/>
  <!-- open book on table -->
  <g transform="translate(400 480)">
    <path d="M-70 0 L-2 -16 L-2 14 L-70 30 Z" fill="#FAF6EE" stroke="#0F172A" stroke-width="4"/>
    <path d="M70 0 L2 -16 L2 14 L70 30 Z" fill="#FAF6EE" stroke="#0F172A" stroke-width="4"/>
    <line x1="-58" y1="6" x2="-12" y2="-4" stroke="#0F172A" stroke-width="2"/>
    <line x1="-58" y1="14" x2="-12" y2="4" stroke="#0F172A" stroke-width="2"/>
    <line x1="58" y1="6" x2="12" y2="-4" stroke="#0F172A" stroke-width="2"/>
    <line x1="58" y1="14" x2="12" y2="4" stroke="#0F172A" stroke-width="2"/>
  </g>
  <!-- 4 student silhouettes -->
  <g fill="#0F172A">
    <!-- top-left -->
    <circle cx="220" cy="280" r="42"/>
    <path d="M150 410 Q220 330 290 410 L290 460 L150 460 Z"/>
    <!-- top-right -->
    <circle cx="580" cy="280" r="42"/>
    <path d="M510 410 Q580 330 650 410 L650 460 L510 460 Z"/>
    <!-- bottom-left -->
    <circle cx="170" cy="610" r="42"/>
    <path d="M100 740 Q170 660 240 740 L240 760 L100 760 Z"/>
    <!-- bottom-right -->
    <circle cx="630" cy="610" r="42"/>
    <path d="M560 740 Q630 660 700 740 L700 760 L560 760 Z"/>
  </g>
  <!-- empty speech bubbles with lightbulbs (idea moments) -->
  <g>
    <!-- top-left bubble -->
    <ellipse cx="320" cy="200" rx="48" ry="32" fill="#FAF6EE" stroke="#0F172A" stroke-width="4"/>
    <path d="M286 222 L274 246 L298 232 Z" fill="#FAF6EE" stroke="#0F172A" stroke-width="4"/>
    <!-- lightbulb inside -->
    <circle cx="320" cy="194" r="14" fill="#F59E0B"/>
    <rect x="312" y="206" width="16" height="6" rx="2" fill="#0F172A"/>
    <!-- top-right bubble -->
    <ellipse cx="490" cy="200" rx="48" ry="32" fill="#FAF6EE" stroke="#0F172A" stroke-width="4"/>
    <path d="M524 222 L536 246 L512 232 Z" fill="#FAF6EE" stroke="#0F172A" stroke-width="4"/>
    <!-- check inside -->
    <path d="M474 200 L484 212 L506 188" fill="none" stroke="#0F766E" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
