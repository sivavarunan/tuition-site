<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#0F172A"/>
  <!-- subtle grid -->
  <g stroke="#FAF6EE" stroke-width="1" opacity="0.06">
    <path d="M0 200 H800 M0 400 H800 M0 600 H800 M200 0 V800 M400 0 V800 M600 0 V800"/>
  </g>
  <!-- terminal window -->
  <rect x="120" y="160" width="560" height="420" rx="14" fill="#1E293B" stroke="#0F766E" stroke-width="4"/>
  <!-- titlebar dots -->
  <g>
    <circle cx="160" cy="200" r="9" fill="#F59E0B"/>
    <circle cx="190" cy="200" r="9" fill="#0F766E"/>
    <circle cx="220" cy="200" r="9" fill="#FAF6EE" opacity="0.4"/>
  </g>
  <line x1="120" y1="232" x2="680" y2="232" stroke="#0F766E" stroke-width="2" opacity="0.5"/>
  <!-- code lines -->
  <g font-family="Menlo, Consolas, monospace" font-size="26" fill="#FAF6EE">
    <text x="160" y="290" fill="#F59E0B">class</text>
    <text x="252" y="290" fill="#FAF6EE">Student</text>
    <text x="370" y="290" fill="#0F766E">{</text>
    <text x="190" y="340" fill="#FAF6EE" opacity="0.6">name:</text>
    <text x="290" y="340" fill="#F59E0B">String;</text>
    <text x="190" y="390" fill="#FAF6EE" opacity="0.6">learn()</text>
    <text x="320" y="390" fill="#0F766E">{</text>
    <text x="220" y="440" fill="#FAF6EE">return</text>
    <text x="335" y="440" fill="#F59E0B">"understood"</text>
    <text x="550" y="440" fill="#0F766E">;</text>
    <text x="190" y="490" fill="#0F766E">}</text>
    <text x="160" y="540" fill="#0F766E">}</text>
  </g>
  <!-- caption -->
  <rect x="120" y="620" width="560" height="56" rx="10" fill="#F59E0B"/>
  <text x="400" y="658" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#0F172A" font-weight="700">IT MENTORING</text>
</svg>
