<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800" preserveAspectRatio="xMidYMid slice">
  <rect width="800" height="800" fill="#0F172A"/>
  <!-- terminal window -->
  <rect x="100" y="160" width="600" height="480" rx="14" fill="#0B1929" stroke="#FAF6EE" stroke-width="4"/>
  <!-- title bar -->
  <rect x="100" y="160" width="600" height="40" rx="14" fill="#1A2D44"/>
  <g>
    <circle cx="130" cy="180" r="8" fill="#F59E0B"/>
    <circle cx="158" cy="180" r="8" fill="#0F766E"/>
    <circle cx="186" cy="180" r="8" fill="#FAF6EE" opacity="0.5"/>
  </g>
  <!-- abstract code lines (no actual text) -->
  <g>
    <!-- prompt arrow -->
    <path d="M140 240 L160 252 L140 264" fill="none" stroke="#0F766E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="180" y="244" width="200" height="14" rx="3" fill="#FAF6EE" opacity="0.85"/>
    <rect x="180" y="284" width="120" height="10" rx="3" fill="#0F766E" opacity="0.9"/>
    <rect x="310" y="284" width="160" height="10" rx="3" fill="#F59E0B" opacity="0.85"/>
    <rect x="180" y="320" width="80" height="10" rx="3" fill="#FAF6EE" opacity="0.6"/>
    <rect x="270" y="320" width="220" height="10" rx="3" fill="#FAF6EE" opacity="0.85"/>
    <rect x="180" y="356" width="60" height="10" rx="3" fill="#F59E0B" opacity="0.85"/>
    <rect x="250" y="356" width="180" height="10" rx="3" fill="#FAF6EE" opacity="0.6"/>
    <rect x="180" y="392" width="140" height="10" rx="3" fill="#0F766E" opacity="0.9"/>
    <rect x="330" y="392" width="100" height="10" rx="3" fill="#FAF6EE" opacity="0.6"/>
    <rect x="180" y="428" width="280" height="10" rx="3" fill="#FAF6EE" opacity="0.4"/>
    <!-- empty line -->
    <rect x="180" y="500" width="40" height="10" rx="3" fill="#0F766E" opacity="0.9"/>
    <rect x="230" y="500" width="200" height="10" rx="3" fill="#FAF6EE" opacity="0.85"/>
    <rect x="180" y="536" width="100" height="10" rx="3" fill="#F59E0B" opacity="0.85"/>
    <rect x="290" y="536" width="160" height="10" rx="3" fill="#FAF6EE" opacity="0.6"/>
    <!-- blinking cursor -->
    <rect x="180" y="586" width="14" height="18" fill="#F59E0B"/>
  </g>
  <!-- corner braces decoration -->
  <g stroke="#0F766E" stroke-width="3" fill="none" opacity="0.6">
    <path d="M620 220 L640 220 L640 240"/>
    <path d="M620 600 L640 600 L640 580"/>
  </g>
</svg>
