<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="600" fill="#0F766E"/>
  <g fill="#FAF6EE" opacity="0.06">
    <circle cx="100" cy="100" r="50"/><circle cx="1100" cy="500" r="80"/>
    <circle cx="1080" cy="80" r="20"/><circle cx="100" cy="500" r="30"/>
  </g>
  <!-- whiteboard -->
  <rect x="120" y="80" width="960" height="440" rx="16" fill="#FAF6EE" stroke="#0F172A" stroke-width="6"/>
  <!-- title -->
  <text x="160" y="160" font-family="Georgia, serif" font-size="42" fill="#0F172A" font-weight="700">Mathematics — O/L</text>
  <line x1="160" y1="180" x2="500" y2="180" stroke="#F59E0B" stroke-width="6"/>
  <!-- equation -->
  <g font-family="Georgia, serif" font-size="56" fill="#0F172A" font-weight="700">
    <text x="160" y="280">a² + b² = c²</text>
  </g>
  <!-- triangle right -->
  <g transform="translate(820 220)" stroke="#0F766E" stroke-width="5" fill="none">
    <polygon points="0,160 200,160 0,0" fill="#FDF7EA"/>
    <text x="-30" y="100" font-family="Georgia, serif" font-size="22" fill="#0F766E" font-weight="700">a</text>
    <text x="100" y="190" font-family="Georgia, serif" font-size="22" fill="#0F766E" font-weight="700">b</text>
    <text x="100" y="80" font-family="Georgia, serif" font-size="22" fill="#F59E0B" font-weight="700">c</text>
  </g>
  <!-- working steps -->
  <g font-family="Georgia, serif" font-size="26" fill="#0F172A" opacity="0.85">
    <text x="160" y="360">Step 1.  identify the right angle</text>
    <text x="160" y="400">Step 2.  label sides a, b, c</text>
    <text x="160" y="440">Step 3.  substitute and solve</text>
  </g>
</svg>
