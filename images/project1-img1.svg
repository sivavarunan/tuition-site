<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" preserveAspectRatio="xMidYMid slice">
  <rect width="1200" height="600" fill="#0F766E"/>
  <g fill="#FAF6EE" opacity="0.06">
    <circle cx="100" cy="100" r="50"/><circle cx="1100" cy="500" r="80"/>
    <circle cx="1080" cy="80" r="20"/><circle cx="100" cy="500" r="30"/>
  </g>
  <!-- whiteboard -->
  <rect x="120" y="80" width="960" height="440" rx="16" fill="#FAF6EE" stroke="#0F172A" stroke-width="6"/>
  <!-- title accent bar (no text) -->
  <rect x="160" y="130" width="220" height="14" rx="4" fill="#F59E0B"/>
  <rect x="160" y="158" width="140" height="8" rx="3" fill="#0F172A" opacity="0.5"/>
  <!-- big right triangle on left side -->
  <g transform="translate(180 220)">
    <polygon points="0,260 280,260 0,40" fill="#FDF7EA" stroke="#0F766E" stroke-width="6"/>
    <!-- right angle marker -->
    <rect x="0" y="232" width="28" height="28" fill="none" stroke="#0F766E" stroke-width="4"/>
    <!-- hypotenuse highlight -->
    <line x1="0" y1="40" x2="280" y2="260" stroke="#F59E0B" stroke-width="6"/>
    <!-- side accents -->
    <circle cx="0" cy="150" r="8" fill="#0F766E"/>
    <circle cx="140" cy="260" r="8" fill="#0F766E"/>
    <circle cx="140" cy="150" r="8" fill="#F59E0B"/>
  </g>
  <!-- right side: 3 abstract steps with accent dots and progress bars -->
  <g transform="translate(620 220)">
    <g>
      <circle cx="0" cy="0" r="24" fill="#0F766E"/>
      <circle cx="0" cy="0" r="10" fill="#FAF6EE"/>
      <rect x="50" y="-8" width="320" height="16" rx="6" fill="#0F172A" opacity="0.85"/>
      <rect x="50" y="14" width="220" height="8" rx="3" fill="#0F172A" opacity="0.45"/>
    </g>
    <g transform="translate(0 90)">
      <circle cx="0" cy="0" r="24" fill="#0F766E"/>
      <circle cx="0" cy="0" r="10" fill="#FAF6EE"/>
      <rect x="50" y="-8" width="280" height="16" rx="6" fill="#0F172A" opacity="0.85"/>
      <rect x="50" y="14" width="180" height="8" rx="3" fill="#0F172A" opacity="0.45"/>
    </g>
    <g transform="translate(0 180)">
      <circle cx="0" cy="0" r="24" fill="#F59E0B"/>
      <path d="M-10 0 L-3 7 L11 -7" stroke="#FAF6EE" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="50" y="-8" width="300" height="16" rx="6" fill="#0F172A" opacity="0.85"/>
      <rect x="50" y="14" width="160" height="8" rx="3" fill="#0F172A" opacity="0.45"/>
    </g>
  </g>
</svg>
